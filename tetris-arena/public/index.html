<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tetris Arena</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#060a10;--surface:#0d1520;--border:rgba(255,255,255,0.08);
  --accent:#00d4ff;--accent2:#b000ff;--danger:#ff1133;
  --text:rgba(255,255,255,0.85);--muted:rgba(255,255,255,0.35);
  --mono:'Share Tech Mono',monospace;--title:'Orbitron',sans-serif;
}
html,body{width:100%;height:100%;background:var(--bg);color:var(--text);
  font-family:var(--mono);overflow:hidden;user-select:none;}
body::after{content:'';pointer-events:none;position:fixed;inset:0;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.04) 2px,rgba(0,0,0,0.04) 4px);z-index:9999;}

.screen{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;}
.screen.hidden{display:none;}

/* Landing */
#landing{flex-direction:column;gap:0;
  background:radial-gradient(ellipse 80% 80% at 50% 40%,rgba(0,212,255,0.06) 0%,transparent 70%);}
.logo{font-family:var(--title);font-size:clamp(2.4rem,6vw,4.5rem);font-weight:900;
  letter-spacing:0.12em;text-transform:uppercase;line-height:1;margin-bottom:4px;
  background:linear-gradient(135deg,#00d4ff 0%,#b000ff 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  filter:drop-shadow(0 0 18px rgba(0,212,255,0.35));}
.logo-sub{font-size:0.72rem;letter-spacing:0.45em;color:var(--muted);text-transform:uppercase;
  margin-bottom:40px;text-align:center;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:10px;
  padding:28px 32px;width:340px;display:flex;flex-direction:column;gap:14px;}
.card-title{font-family:var(--title);font-size:0.7rem;letter-spacing:0.3em;
  color:var(--muted);text-transform:uppercase;margin-bottom:2px;}
label{font-size:0.7rem;color:var(--muted);letter-spacing:0.12em;display:block;margin-bottom:4px;}
input[type=text]{width:100%;background:rgba(255,255,255,0.04);border:1px solid var(--border);
  border-radius:6px;color:var(--text);font-family:var(--mono);font-size:0.9rem;
  padding:10px 12px;outline:none;transition:border .15s;text-transform:uppercase;}
input[type=text]::placeholder{color:var(--muted);text-transform:none;}
input[type=text]:focus{border-color:var(--accent);}
.btn{width:100%;padding:11px 0;border:none;border-radius:6px;font-family:var(--title);
  font-size:0.72rem;font-weight:700;letter-spacing:0.22em;text-transform:uppercase;
  cursor:pointer;transition:filter .15s,transform .1s;}
.btn:active{transform:scale(0.97);}
.btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#000;
  box-shadow:0 0 18px rgba(0,212,255,0.25);}
.btn-primary:hover{filter:brightness(1.15);}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--text);}
.btn-ghost:hover{border-color:var(--accent);color:var(--accent);}
.divider{display:flex;align-items:center;gap:10px;color:var(--muted);font-size:0.65rem;letter-spacing:0.2em;}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border);}
.error-msg{color:var(--danger);font-size:0.72rem;letter-spacing:0.1em;min-height:16px;text-align:center;}

/* Lobby */
#lobby{flex-direction:column;gap:0;}
.room-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;
  padding:28px 32px;width:420px;display:flex;flex-direction:column;gap:16px;}
.room-code-display{text-align:center;font-family:var(--title);font-size:2.6rem;font-weight:900;
  letter-spacing:0.3em;color:var(--accent);filter:drop-shadow(0 0 12px rgba(0,212,255,0.4));
  cursor:pointer;transition:filter .2s;}
.room-code-display:hover{filter:brightness(1.3) drop-shadow(0 0 16px rgba(0,212,255,0.6));}
.copy-hint{text-align:center;font-size:0.6rem;color:var(--muted);letter-spacing:0.22em;cursor:pointer;margin-top:-8px;}
.copy-hint:hover{color:var(--accent);}
.player-list{display:flex;flex-direction:column;gap:6px;}
.player-row{display:flex;align-items:center;gap:10px;padding:8px 12px;
  background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:6px;font-size:0.82rem;}
.player-row.you{border-color:rgba(0,212,255,0.3);}
.player-dot{width:8px;height:8px;border-radius:50%;background:var(--accent);flex-shrink:0;}
.player-dot.host{background:var(--accent2);}
.player-name{flex:1;}
.player-badge{font-size:0.6rem;color:var(--muted);letter-spacing:0.18em;}
.waiting-msg{text-align:center;font-size:0.68rem;color:var(--muted);letter-spacing:0.2em;
  animation:blink 1.4s ease-in-out infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}

/* Game */
#game{background:var(--bg);}
#game-canvas{display:block;}

/* Overlays */
.overlay{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:20px;background:rgba(6,10,16,0.88);backdrop-filter:blur(4px);z-index:100;}
.overlay.hidden{display:none;}
.overlay-title{font-family:var(--title);font-size:clamp(1.8rem,5vw,3.5rem);font-weight:900;
  letter-spacing:0.15em;text-transform:uppercase;}
.overlay-title.win{color:var(--accent);filter:drop-shadow(0 0 20px rgba(0,212,255,0.5));}
.overlay-title.lose{color:var(--muted);}
.overlay-sub{font-size:0.85rem;color:var(--muted);letter-spacing:0.2em;}
.overlay-btns{display:flex;flex-direction:column;gap:10px;width:260px;}
.dead-banner{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
  font-family:var(--title);font-size:2rem;font-weight:900;color:var(--danger);
  letter-spacing:0.2em;pointer-events:none;z-index:50;
  text-shadow:0 0 30px rgba(255,26,58,0.7);animation:fadeOut 2.5s forwards;}
@keyframes fadeOut{0%{opacity:1}70%{opacity:1}100%{opacity:0}}

/* Key hints */
#keyhints{position:fixed;bottom:14px;left:50%;transform:translateX(-50%);
  display:flex;gap:18px;font-size:0.62rem;color:var(--muted);letter-spacing:0.12em;pointer-events:none;}
.hint-key{display:inline-block;padding:2px 5px;background:rgba(255,255,255,0.06);
  border:1px solid var(--border);border-radius:3px;margin-right:3px;font-family:var(--mono);}

/* Mute button */
#btn-mute{position:fixed;top:14px;right:16px;background:rgba(255,255,255,0.05);
  border:1px solid var(--border);border-radius:6px;color:var(--muted);font-family:var(--mono);
  font-size:0.75rem;padding:6px 12px;cursor:pointer;z-index:300;letter-spacing:0.12em;
  transition:color .15s,border-color .15s;}
#btn-mute:hover{color:var(--accent);border-color:var(--accent);}

/* Toast */
#toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);
  background:rgba(13,21,32,0.95);border:1px solid var(--accent);border-radius:6px;
  padding:8px 18px;font-size:0.75rem;letter-spacing:0.18em;color:var(--accent);
  z-index:200;pointer-events:none;opacity:0;transition:opacity .2s;}
#toast.show{opacity:1;}
</style>
</head>
<body>

<button id="btn-mute">🔊 SOUND</button>

<!-- Landing -->
<div id="landing" class="screen">
  <h1 class="logo">TETRIS ARENA</h1>
  <p class="logo-sub">multiplayer · 4 players · real-time</p>
  <div class="card">
    <p class="card-title">Enter the Arena</p>
    <div>
      <label>YOUR NAME</label>
      <input type="text" id="inp-name" maxlength="16" placeholder="Player">
    </div>
    <button class="btn btn-primary" id="btn-create">Create Room</button>
    <div class="divider">OR</div>
    <div>
      <label>ROOM CODE</label>
      <input type="text" id="inp-code" maxlength="4" placeholder="ABCD">
    </div>
    <button class="btn btn-ghost" id="btn-join">Join Room</button>
    <p class="error-msg" id="landing-err"></p>
  </div>
</div>

<!-- Lobby -->
<div id="lobby" class="screen hidden">
  <div class="room-card">
    <p class="card-title" style="text-align:center">Room Code</p>
    <div class="room-code-display" id="lobby-code">——</div>
    <p class="copy-hint" id="copy-hint">CLICK CODE TO COPY INVITE LINK</p>
    <div class="player-list" id="player-list"></div>
    <p class="waiting-msg" id="waiting-msg">Waiting for players…</p>
    <button class="btn btn-primary hidden" id="btn-start">START GAME</button>
    <button class="btn btn-ghost" id="btn-leave">Leave Room</button>
  </div>
</div>

<!-- Game -->
<div id="game" class="screen hidden">
  <canvas id="game-canvas"></canvas>
  <div id="keyhints">
    <span><span class="hint-key">←→</span>Move</span>
    <span><span class="hint-key">↑/X</span>Rotate CW</span>
    <span><span class="hint-key">Z</span>Rotate CCW</span>
    <span><span class="hint-key">↓</span>Soft drop</span>
    <span><span class="hint-key">SPC</span>Hard drop</span>
    <span><span class="hint-key">C</span>Hold</span>
  </div>
</div>

<!-- Game Over Overlay -->
<div id="overlay-gameover" class="overlay hidden">
  <h2 class="overlay-title" id="ov-title">—</h2>
  <p class="overlay-sub"  id="ov-sub">—</p>
  <div class="overlay-btns">
    <button class="btn btn-ghost hidden" id="btn-rematch">PLAY AGAIN</button>
    <button class="btn btn-ghost" id="btn-back-lobby">BACK TO LOBBY</button>
    <button class="btn btn-ghost" id="btn-quit">QUIT</button>
  </div>
</div>

<div id="toast"></div>

<script src="/socket.io/socket.io.js"></script>
<script src="engine.js"></script>
<script src="sounds.js"></script>
<script src="renderer.js"></script>
<script src="input.js"></script>
<script src="game.js"></script>
<script src="app.js"></script>
<script>
  SoundSystem.init();
  let muted = false;
  document.getElementById('btn-mute').addEventListener('click', () => {
    muted = !muted;
    SoundSystem.setEnabled(!muted);
    document.getElementById('btn-mute').textContent = muted ? '🔇 MUTED' : '🔊 SOUND';
  });
</script>
</body>
</html>
